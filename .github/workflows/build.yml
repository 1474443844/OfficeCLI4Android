name: Build Android ELF

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: android-arm64
            name: officecli-android-arm64
            os: ubuntu-latest
            extra_args: "-p:CppCompilerAndLinker=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang"
          - rid: android-x64
            name: officecli-android-x64
            os: ubuntu-latest
            extra_args: "-p:CppCompilerAndLinker=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android34-clang"
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Android Workload
        run: dotnet workload install android

      - name: Publish
        run: |
          dotnet publish src/officecli/officecli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o publish \
            --nologo \
            ${{ matrix.extra_args }}

      - name: Rename output
        run: |
          if [ -f publish/officecli.exe ]; then
            mv publish/officecli.exe publish/${{ matrix.name }}
          else
            mv publish/officecli publish/${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: publish/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts and generate checksums
        run: |
          mkdir -p flat
          find artifacts -type f -exec mv {} flat/ \;
          rm -rf artifacts
          mv flat artifacts
          cd artifacts
          sha256sum officecli-* > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
