name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            name: officecli-mac-arm64
            bin: officecli-mac-arm64
            os: macos-latest

          - rid: osx-x64
            name: officecli-mac-x64
            bin: officecli-mac-x64
            os: macos-latest

          - rid: linux-x64
            name: officecli-linux-x64
            bin: officecli-linux-x64
            os: ubuntu-latest

          - rid: linux-arm64
            name: officecli-linux-arm64
            bin: officecli-linux-arm64
            os: ubuntu-latest

          - rid: linux-musl-x64
            name: officecli-linux-alpine-x64
            bin: officecli-linux-alpine-x64
            os: ubuntu-latest

          - rid: linux-musl-arm64
            name: officecli-linux-alpine-arm64
            bin: officecli-linux-alpine-arm64
            os: ubuntu-latest

          - rid: win-x64
            name: officecli-win-x64.exe
            bin: officecli-win-x64.exe
            os: windows-latest

          - rid: win-arm64
            name: officecli-win-arm64.exe
            bin: officecli-win-arm64.exe
            os: windows-latest

          # Android NativeAOT ELF.
          # This is not an APK. It is intended to be packaged into an Android app as:
          # app/src/main/jniLibs/arm64-v8a/libofficecli.so
          - rid: android-arm64
            name: officecli-android-arm64
            bin: libofficecli.so
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Android SDK
        if: startsWith(matrix.rid, 'android-')
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: startsWith(matrix.rid, 'android-')
        run: |
          sdkmanager "ndk;27.2.12479018"

      - name: Publish
        if: ${{ !startsWith(matrix.rid, 'android-') }}
        run: |
          dotnet publish src/officecli/officecli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -o publish \
            --nologo

      - name: Publish Android NativeAOT
        if: startsWith(matrix.rid, 'android-')
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: |
          dotnet publish src/officecli/officecli.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:SelfContained=true \
            -o publish \
            --nologo

      - name: List publish output
        run: |
          echo "=== publish output ==="
          find publish -maxdepth 3 -type f -print

      - name: Rename output
        run: |
          if [[ "${{ matrix.rid }}" == android-* ]]; then
            if [ -f publish/officecli ]; then
              mv publish/officecli publish/${{ matrix.bin }}
            else
              echo "FAIL: Android NativeAOT output publish/officecli not found"
              find publish -maxdepth 3 -type f -print
              exit 1
            fi
          elif [ -f publish/officecli.exe ]; then
            mv publish/officecli.exe publish/${{ matrix.bin }}
          elif [ -f publish/officecli ]; then
            mv publish/officecli publish/${{ matrix.bin }}
          else
            echo "FAIL: output executable not found"
            find publish -maxdepth 3 -type f -print
            exit 1
          fi

      - name: Verify Android ELF
        if: startsWith(matrix.rid, 'android-')
        run: |
          file publish/${{ matrix.bin }}
          chmod +x publish/${{ matrix.bin }}

      - name: Ad-hoc codesign macOS
        if: startsWith(matrix.rid, 'osx-')
        run: |
          codesign -s - -f publish/${{ matrix.bin }}

      - name: Smoke test - create document
        if: >-
          (matrix.rid == 'osx-arm64' && runner.arch == 'ARM64') ||
          (matrix.rid == 'osx-x64' && runner.arch == 'X64') ||
          (matrix.rid == 'linux-x64' && runner.os == 'Linux') ||
          (matrix.rid == 'win-x64' && runner.os == 'Windows')
        env:
          MSYS_NO_PATHCONV: '1'
          MSYS2_ARG_CONV_EXCL: '*'
        run: |
          chmod +x publish/${{ matrix.bin }}
          publish/${{ matrix.bin }} create test_smoke.docx
          publish/${{ matrix.bin }} add test_smoke.docx /body --type paragraph --prop text="Hello from CI"
          publish/${{ matrix.bin }} get test_smoke.docx '/body/p[1]'
          publish/${{ matrix.bin }} close test_smoke.docx
          rm -f test_smoke.docx

      - name: Smoke test - .NET 8-only runtime linux-x64
        if: matrix.rid == 'linux-x64' && runner.os == 'Linux'
        run: |
          chmod +x publish/${{ matrix.bin }}
          mkdir -p smoke_net8
          docker run --rm \
            -v "$PWD/publish:/app:ro" \
            -v "$PWD/smoke_net8:/work" \
            -w /work \
            mcr.microsoft.com/dotnet/runtime:8.0 \
            bash -c "set -e; \
              /app/${{ matrix.bin }} create issue115.docx; \
              /app/${{ matrix.bin }} add issue115.docx /body --type paragraph --prop text='net8 smoke'; \
              /app/${{ matrix.bin }} close issue115.docx; \
              /app/${{ matrix.bin }} view issue115.docx text --json"

      - name: Smoke test - install
        if: >-
          (matrix.rid == 'osx-arm64' && runner.arch == 'ARM64') ||
          (matrix.rid == 'osx-x64' && runner.arch == 'X64') ||
          (matrix.rid == 'linux-x64' && runner.os == 'Linux') ||
          (matrix.rid == 'win-x64' && runner.os == 'Windows')
        env:
          MSYS_NO_PATHCONV: '1'
          MSYS2_ARG_CONV_EXCL: '*'
        run: |
          publish/${{ matrix.bin }} install
          if [ "$RUNNER_OS" == "Windows" ]; then
            test -f "$LOCALAPPDATA/OfficeCLI/officecli.exe" || { echo "FAIL: officecli.exe not found in %LOCALAPPDATA%\\OfficeCLI"; exit 1; }
            "$LOCALAPPDATA/OfficeCLI/officecli.exe" --version
          else
            test -f "$HOME/.local/bin/officecli" || { echo "FAIL: officecli not found in ~/.local/bin"; exit 1; }
            "$HOME/.local/bin/officecli" --version
          fi

      - name: Smoke test - install.sh / install.ps1
        if: >-
          (matrix.rid == 'osx-arm64' && runner.arch == 'ARM64') ||
          (matrix.rid == 'osx-x64' && runner.arch == 'X64') ||
          (matrix.rid == 'linux-x64' && runner.os == 'Linux') ||
          (matrix.rid == 'win-x64' && runner.os == 'Windows')
        shell: bash
        env:
          MSYS_NO_PATHCONV: '1'
          MSYS2_ARG_CONV_EXCL: '*'
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            pwsh -NoProfile -ExecutionPolicy Bypass -File ./install.ps1
            test -f "$LOCALAPPDATA/OfficeCLI/officecli.exe" || { echo "FAIL: officecli.exe not installed"; exit 1; }
            "$LOCALAPPDATA/OfficeCLI/officecli.exe" --version
          else
            bash install.sh
            test -f "$HOME/.local/bin/officecli" || { echo "FAIL: officecli not installed at ~/.local/bin"; exit 1; }
            "$HOME/.local/bin/officecli" --version
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: publish/${{ matrix.bin }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts and generate checksums
        run: |
          mkdir -p flat
          find artifacts -type f -exec mv {} flat/ \;
          rm -rf artifacts
          mv flat artifacts
          cd artifacts
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
